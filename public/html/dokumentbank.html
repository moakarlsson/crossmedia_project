<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentbank</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dokumentbank.css">
</head>

<body>
    <main>
        <header>
            <div id="timerDIV">
                <div id="timerDisplay"></div>
            </div>
        </header>

        <div id="content">

            <div id="contentDivs">

                <div id="artikel" class="docDiv">
                    <p class="docDivP">Nyhetsartikel</p>
                    <img id="imgNyhet" src="../assets/images/padlock.png" alt="padlock">
                    <p id="messageA">"Ej upplåst ännu"</p>
                </div>

                <div id="mail" class="docDiv">
                    <p class="docDivP">Mail</p>
                    <img id="imgMail" src="../assets/images/padlock.png" alt="padlock">
                    <p id="messageM">"Ej upplåst ännu"</p>
                </div>

                <div id="symboler" class="docDiv">
                    <p class="docDivP">Symboler</p>
                    <img id="imgSymboler" src="../assets/images/padlock.png" alt="padlock">
                    <p id="messageS">"Ej upplåst ännu"</p>
                </div>

            </div>
        </div>

        <div>
            <button id="backButton">Tillbaka till spelet</button>
        </div>

        <footer id="footer"></footer>
    </main>


    <script src="../javascript/meny.js"></script>
    <script src="../javascript/timer.js"></script>
    <script src="../javascript/dokumentbank.js"></script>
</body>

</html>
