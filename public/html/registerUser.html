<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spel</title>
    <link rel="stylesheet" href="../css/registerUser.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main>
        <div id="topBar"></div>
        <div id="container">
            <h2>Skapa ditt lag</h2>
            <div id="registerDIV">
                <div class="user_credentials">
                    <label for="username">Användarnamn:</label>
                    <input id="username" type="text" name="username">
                </div>

                <div class="user_credentialsPassword ">
                    <div class="user_credentials">
                        <label for="password">Lösenord:</label>
                        <input id="password" type="password" name="password">
                    </div>

                    <div class="user_credentials">
                        <label for="passwordAgain">Bekräfta lösenordet:</label>
                        <input id="password_confirm" type="password" name="passwordAgain">
                    </div>
                    <p id="passwordMessage"></p>
                </div>

                <div class="user_credentials">
                    <div id="labels">
                        <label for="members">Gruppmedlemmar:</label>
                        <label id="nr2Lable" for="members">För- och efternamn</label>
                    </div>
                    <input type="text" id="members" name="members">
                </div>


                <div id="addPic">
                    <div id="thePic">
                        <div>
                            <p>⬆️</p>
                            <p>Välj en fil att ladda upp</p>
                        </div>
                    </div>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>

                <div id="createButtonDiv">
                    <button id="create_button">Create account</button>
                </div>
            </div>

    </main>

    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <h3>Du är nu registrerad!</h3>
            <p>Du är nu inloggad.</p>
            <button id="startaSpelet">Starta spelet →</button>
        </div>
    </div>
    <script src="../javascript/registerUser.js"></script>
</body>

</html>
